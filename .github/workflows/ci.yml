name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install pnpm dependencies for polyglot template
        run: pnpm install
        working-directory: .agents/skills/polyglot-scaffold/template

      - name: Install Python dev dependencies
        run: uv sync --dev

      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test skill scripts
        run: uv run pytest -vv tests/test_skills.py
